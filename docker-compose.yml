# Strata Notebook Environment
#
# Quick start:
#   docker compose up -d
#   Open http://localhost:8765 in your browser
#
# This builds Strata with the notebook frontend and runs it locally.

services:
  # Strata server
  strata:
    build: .
    ports:
      - "8765:8765"
    volumes:
      # Mount the demo warehouse (created by setup script)
      - ./demo-warehouse:/data/warehouse:ro
      # Persist Strata state (cache + metadata + artifacts) between restarts
      - strata-state:/home/strata/.strata
      # Persist notebooks between restarts (matches the frontend boot path)
      - strata-notebooks:/tmp/strata-notebooks
    environment:
      - STRATA_DEPLOYMENT_MODE=personal
      - STRATA_ALLOW_REMOTE_CLIENTS_IN_PERSONAL=true
      - STRATA_HOST=0.0.0.0
      - STRATA_PORT=8765
      - STRATA_CACHE_DIR=/home/strata/.strata/cache
      - STRATA_METADATA_DB=/home/strata/.strata/meta.sqlite
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  strata-state:
  strata-notebooks:
