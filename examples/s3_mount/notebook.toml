notebook_id = "s3-mount-example-001"
name = "S3 Mount (Public Bucket)"
created_at = 2026-04-14T00:00:00Z
updated_at = 2026-04-14T00:00:00Z

# Mount the 2024 weather file for a NYC-area airport (NOAA GSOD) from an
# anonymous-readable S3 bucket (AWS Open Data). No AWS credentials needed —
# the options table below tells fsspec to use anonymous access.
#
# To use a private bucket instead: drop `options` and run `aws configure`.
[[mounts]]
name = "jfk_weather"
uri = "s3://noaa-gsod-pds/2024/72503014732.csv"
mode = "ro"
options = { anon = true }

[[cells]]
id = "load"
file = "load.py"
language = "python"
order = 0

[[cells]]
id = "summary"
file = "summary.py"
language = "python"
order = 1
