preview = [
    [
        "\"Mental Rotation\" by Optimizing Transforming Distance",
        "  The human visual system is able to recognize objects despite transformations\nthat can drastically alter their appearance. To this end, much effort has been\ndevoted to the invariance properties of recognition systems. Invariance can be\nengineered (e.g. convolutional nets), or learned from data explicitly (e.g.\ntemporal coherence) or implicitly (e.g. by data augmentation). One idea that\nhas not, to date, been explored is the integration of latent variables which\npermit a search over a learned space of transformations. Motivated by evidence\nthat people mentally simulate transformations in space while comparing\nexamples, so-called \"mental rotation\", we propose a transforming distance.\nHere, a trained relational model actively transforms pairs of examples so that\nthey are maximally similar in some feature space yet respect the learned\ntransformational constraints. We apply our method to nearest-neighbour problems\non the Toronto Face Database and NORB.\n",
        "computer-vision",
    ],
    [
        "\"Show me the cup\": Reference with Continuous Representations",
        "  One of the most basic functions of language is to refer to objects in a\nshared scene. Modeling reference with continuous representations is challenging\nbecause it requires individuation, i.e., tracking and distinguishing an\narbitrary number of referents. We introduce a neural network model that, given\na definite description and a set of objects represented by natural images,\npoints to the intended object if the expression has a unique referent, or\nindicates a failure, if it does not. The model, directly trained on reference\nacts, is competitive with a pipeline manually engineered to perform the same\ntask, both when referents are purely visual, and when they are characterized by\na combination of visual and linguistic properties.\n",
        "computer-vision",
    ],
    [
        "\"Why Should I Trust Interactive Learners?\" Explaining Interactive\n  Queries of Classifiers to Users",
        "  Although interactive learning puts the user into the loop, the learner\nremains mostly a black box for the user. Understanding the reasons behind\nqueries and predictions is important when assessing how the learner works and,\nin turn, trust. Consequently, we propose the novel framework of explanatory\ninteractive learning: in each step, the learner explains its interactive query\nto the user, and she queries of any active classifier for visualizing\nexplanations of the corresponding predictions. We demonstrate that this can\nboost the predictive and explanatory powers of and the trust into the learned\nmodel, using text (e.g. SVMs) and image classification (e.g. neural networks)\nexperiments as well as a user study.\n",
        "computer-vision",
    ],
    [
        "\"Why Should I Trust You?\": Explaining the Predictions of Any Classifier",
        "  Despite widespread adoption, machine learning models remain mostly black\nboxes. Understanding the reasons behind predictions is, however, quite\nimportant in assessing trust, which is fundamental if one plans to take action\nbased on a prediction, or when choosing whether to deploy a new model. Such\nunderstanding also provides insights into the model, which can be used to\ntransform an untrustworthy model or prediction into a trustworthy one. In this\nwork, we propose LIME, a novel explanation technique that explains the\npredictions of any classifier in an interpretable and faithful manner, by\nlearning an interpretable model locally around the prediction. We also propose\na method to explain models by presenting representative individual predictions\nand their explanations in a non-redundant way, framing the task as a submodular\noptimization problem. We demonstrate the flexibility of these methods by\nexplaining different models for text (e.g. random forests) and image\nclassification (e.g. neural networks). We show the utility of explanations via\nnovel experiments, both simulated and with human subjects, on various scenarios\nthat require trust: deciding if one should trust a prediction, choosing between\nmodels, improving an untrustworthy classifier, and identifying why a classifier\nshould not be trusted.\n",
        "computer-vision",
    ],
    [
        "\"Zero-Shot\" Super-Resolution using Deep Internal Learning",
        "  Deep Learning has led to a dramatic leap in Super-Resolution (SR) performance\nin the past few years. However, being supervised, these SR methods are\nrestricted to specific training data, where the acquisition of the\nlow-resolution (LR) images from their high-resolution (HR) counterparts is\npredetermined (e.g., bicubic downscaling), without any distracting artifacts\n(e.g., sensor noise, image compression, non-ideal PSF, etc). Real LR images,\nhowever, rarely obey these restrictions, resulting in poor SR results by SotA\n(State of the Art) methods. In this paper we introduce \"Zero-Shot\" SR, which\nexploits the power of Deep Learning, but does not rely on prior training. We\nexploit the internal recurrence of information inside a single image, and train\na small image-specific CNN at test time, on examples extracted solely from the\ninput image itself. As such, it can adapt itself to different settings per\nimage. This allows to perform SR of real old photos, noisy images, biological\ndata, and other images where the acquisition process is unknown or non-ideal.\nOn such images, our method outperforms SotA CNN-based SR methods, as well as\nprevious unsupervised SR methods. To the best of our knowledge, this is the\nfirst unsupervised CNN-based SR method.\n",
        "computer-vision",
    ],
    [
        "$\\ell_0$ Sparsifying Transform Learning with Efficient Optimal Updates\n  and Convergence Guarantees",
        "  Many applications in signal processing benefit from the sparsity of signals\nin a certain transform domain or dictionary. Synthesis sparsifying dictionaries\nthat are directly adapted to data have been popular in applications such as\nimage denoising, inpainting, and medical image reconstruction. In this work, we\nfocus instead on the sparsifying transform model, and study the learning of\nwell-conditioned square sparsifying transforms. The proposed algorithms\nalternate between a $\\ell_0$ \"norm\"-based sparse coding step, and a non-convex\ntransform update step. We derive the exact analytical solution for each of\nthese steps. The proposed solution for the transform update step achieves the\nglobal minimum in that step, and also provides speedups over iterative\nsolutions involving conjugate gradients. We establish that our alternating\nalgorithms are globally convergent to the set of local minimizers of the\nnon-convex transform learning problems. In practice, the algorithms are\ninsensitive to initialization. We present results illustrating the promising\nperformance and significant speed-ups of transform learning over synthesis\nK-SVD in image denoising.\n",
        "computer-vision",
    ],
    [
        "$\\ell_1$-K-SVD: A Robust Dictionary Learning Algorithm With Simultaneous\n  Update",
        "  We develop a dictionary learning algorithm by minimizing the $\\ell_1$\ndistortion metric on the data term, which is known to be robust for\nnon-Gaussian noise contamination. The proposed algorithm exploits the idea of\niterative minimization of weighted $\\ell_2$ error. We refer to this algorithm\nas $\\ell_1$-K-SVD, where the dictionary atoms and the corresponding sparse\ncoefficients are simultaneously updated to minimize the $\\ell_1$ objective,\nresulting in noise-robustness. We demonstrate through experiments that the\n$\\ell_1$-K-SVD algorithm results in higher atom recovery rate compared with the\nK-SVD and the robust dictionary learning (RDL) algorithm proposed by Lu et al.,\nboth in Gaussian and non-Gaussian noise conditions. We also show that, for\nfixed values of sparsity, number of dictionary atoms, and data-dimension, the\n$\\ell_1$-K-SVD algorithm outperforms the K-SVD and RDL algorithms when the\ntraining set available is small. We apply the proposed algorithm for denoising\nnatural images corrupted by additive Gaussian and Laplacian noise. The images\ndenoised using $\\ell_1$-K-SVD are observed to have slightly higher peak\nsignal-to-noise ratio (PSNR) over K-SVD for Laplacian noise, but the\nimprovement in structural similarity index (SSIM) is significant (approximately\n$0.1$) for lower values of input PSNR, indicating the efficacy of the $\\ell_1$\nmetric.\n",
        "computer-vision",
    ],
    [
        "$\\mathbf{D^3}$: Deep Dual-Domain Based Fast Restoration of\n  JPEG-Compressed Images",
        "  In this paper, we design a Deep Dual-Domain ($\\mathbf{D^3}$) based fast\nrestoration model to remove artifacts of JPEG compressed images. It leverages\nthe large learning capacity of deep networks, as well as the problem-specific\nexpertise that was hardly incorporated in the past design of deep\narchitectures. For the latter, we take into consideration both the prior\nknowledge of the JPEG compression scheme, and the successful practice of the\nsparsity-based dual-domain approach. We further design the One-Step Sparse\nInference (1-SI) module, as an efficient and light-weighted feed-forward\napproximation of sparse coding. Extensive experiments verify the superiority of\nthe proposed $D^3$ model over several state-of-the-art methods. Specifically,\nour best model is capable of outperforming the latest deep model for around 1\ndB in PSNR, and is 30 times faster.\n",
        "computer-vision",
    ],
    [
        "2D View Aggregation for Lymph Node Detection Using a Shallow Hierarchy\n  of Linear Classifiers",
        "  Enlarged lymph nodes (LNs) can provide important information for cancer\ndiagnosis, staging, and measuring treatment reactions, making automated\ndetection a highly sought goal. In this paper, we propose a new algorithm\nrepresentation of decomposing the LN detection problem into a set of 2D object\ndetection subtasks on sampled CT slices, largely alleviating the curse of\ndimensionality issue. Our 2D detection can be effectively formulated as linear\nclassification on a single image feature type of Histogram of Oriented\nGradients (HOG), covering a moderate field-of-view of 45 by 45 voxels. We\nexploit both simple pooling and sparse linear fusion schemes to aggregate these\n2D detection scores for the final 3D LN detection. In this manner, detection is\nmore tractable and does not need to perform perfectly at instance level (as\nweak hypotheses) since our aggregation process will robustly harness collective\ninformation for LN detection. Two datasets (90 patients with 389 mediastinal\nLNs and 86 patients with 595 abdominal LNs) are used for validation.\nCross-validation demonstrates 78.0% sensitivity at 6 false positives/volume\n(FP/vol.) (86.1% at 10 FP/vol.) and 73.1% sensitivity at 6 FP/vol. (87.2% at 10\nFP/vol.), for the mediastinal and abdominal datasets respectively. Our results\ncompare favorably to previous state-of-the-art methods.\n",
        "computer-vision",
    ],
    [
        "3D Consistent & Robust Segmentation of Cardiac Images by Deep Learning\n  with Spatial Propagation",
        "  We propose a method based on deep learning to perform cardiac segmentation on\nshort axis MRI image stacks iteratively from the top slice (around the base) to\nthe bottom slice (around the apex). At each iteration, a novel variant of U-net\nis applied to propagate the segmentation of a slice to the adjacent slice below\nit. In other words, the prediction of a segmentation of a slice is dependent\nupon the already existing segmentation of an adjacent slice. 3D-consistency is\nhence explicitly enforced. The method is trained on a large database of 3078\ncases from UK Biobank. It is then tested on 756 different cases from UK Biobank\nand three other state-of-the-art cohorts (ACDC with 100 cases, Sunnybrook with\n30 cases, RVSC with 16 cases). Results comparable or even better than the\nstate-of-the-art in terms of distance measures are achieved. They also\nemphasize the assets of our method, namely enhanced spatial consistency\n(currently neither considered nor achieved by the state-of-the-art), and the\ngeneralization ability to unseen cases even from other databases.\n",
        "computer-vision",
    ],
    [
        "3D Consistent Biventricular Myocardial Segmentation Using Deep Learning\n  for Mesh Generation",
        "  We present a novel automated method to segment the myocardium of both left\nand right ventricles in MRI volumes. The segmentation is consistent in 3D\nacross the slices such that it can be directly used for mesh generation. Two\nspecific neural networks with multi-scale coarse-to-fine prediction structure\nare proposed to cope with the small training dataset and trained using an\noriginal loss function. The former segments a slice in the middle of the\nvolume. Then the latter iteratively propagates the slice segmentations towards\nthe base and the apex, in a spatially consistent way. We perform 5-fold\ncross-validation on the 15 cases from STACOM to validate the method. For\ntraining, we use real cases and their synthetic variants generated by combining\nmotion simulation and image synthesis. Accurate and consistent testing results\nare obtained.\n",
        "computer-vision",
    ],
    [
        "3D Interpreter Networks for Viewer-Centered Wireframe Modeling",
        "  Understanding 3D object structure from a single image is an important but\nchallenging task in computer vision, mostly due to the lack of 3D object\nannotations to real images. Previous research tackled this problem by either\nsearching for a 3D shape that best explains 2D annotations, or training purely\non synthetic data with ground truth 3D information. In this work, we propose 3D\nINterpreter Networks (3D-INN), an end-to-end trainable framework that\nsequentially estimates 2D keypoint heatmaps and 3D object skeletons and poses.\nOur system learns from both 2D-annotated real images and synthetic 3D data.\nThis is made possible mainly by two technical innovations. First, heatmaps of\n2D keypoints serve as an intermediate representation to connect real and\nsynthetic data. 3D-INN is trained on real images to estimate 2D keypoint\nheatmaps from an input image; it then predicts 3D object structure from\nheatmaps using knowledge learned from synthetic 3D shapes. By doing so, 3D-INN\nbenefits from the variation and abundance of synthetic 3D objects, without\nsuffering from the domain difference between real and synthesized images, often\ndue to imperfect rendering. Second, we propose a Projection Layer, mapping\nestimated 3D structure back to 2D. During training, it ensures 3D-INN to\npredict 3D structure whose projection is consistent with the 2D annotations to\nreal images. Experiments show that the proposed system performs well on both 2D\nkeypoint estimation and 3D structure recovery. We also demonstrate that the\nrecovered 3D information has wide vision applications, such as image retrieval.\n",
        "computer-vision",
    ],
    [
        "3D Morphology Prediction of Progressive Spinal Deformities from\n  Probabilistic Modeling of Discriminant Manifolds",
        "  We introduce a novel approach for predicting the progression of adolescent\nidiopathic scoliosis from 3D spine models reconstructed from biplanar X-ray\nimages. Recent progress in machine learning have allowed to improve\nclassification and prognosis rates, but lack a probabilistic framework to\nmeasure uncertainty in the data. We propose a discriminative probabilistic\nmanifold embedding where locally linear mappings transform data points from\nhigh-dimensional space to corresponding low-dimensional coordinates. A\ndiscriminant adjacency matrix is constructed to maximize the separation between\nprogressive and non-progressive groups of patients diagnosed with scoliosis,\nwhile minimizing the distance in latent variables belonging to the same class.\nTo predict the evolution of deformation, a baseline reconstruction is projected\nonto the manifold, from which a spatiotemporal regression model is built from\nparallel transport curves inferred from neighboring exemplars. Rate of\nprogression is modulated from the spine flexibility and curve magnitude of the\n3D spine deformation. The method was tested on 745 reconstructions from 133\nsubjects using longitudinal 3D reconstructions of the spine, with results\ndemonstrating the discriminatory framework can identify between progressive and\nnon-progressive of scoliotic patients with a classification rate of 81% and\nprediction differences of 2.1$^{o}$ in main curve angulation, outperforming\nother manifold learning methods. Our method achieved a higher prediction\naccuracy and improved the modeling of spatiotemporal morphological changes in\nhighly deformed spines compared to other learning methods.\n",
        "computer-vision",
    ],
    [
        "3D-PRNN: Generating Shape Primitives with Recurrent Neural Networks",
        "  The success of various applications including robotics, digital content\ncreation, and visualization demand a structured and abstract representation of\nthe 3D world from limited sensor data. Inspired by the nature of human\nperception of 3D shapes as a collection of simple parts, we explore such an\nabstract shape representation based on primitives. Given a single depth image\nof an object, we present 3D-PRNN, a generative recurrent neural network that\nsynthesizes multiple plausible shapes composed of a set of primitives. Our\ngenerative model encodes symmetry characteristics of common man-made objects,\npreserves long-range structural coherence, and describes objects of varying\ncomplexity with a compact representation. We also propose a method based on\nGaussian Fields to generate a large scale dataset of primitive-based shape\nrepresentations to train our network. We evaluate our approach on a wide range\nof examples and show that it outperforms nearest-neighbor based shape retrieval\nmethods and is on-par with voxel-based generative models while using a\nsignificantly reduced parameter space.\n",
        "computer-vision",
    ],
    [
        "3LC: Lightweight and Effective Traffic Compression for Distributed\n  Machine Learning",
        "  The performance and efficiency of distributed machine learning (ML) depends\nsignificantly on how long it takes for nodes to exchange state changes.\nOverly-aggressive attempts to reduce communication often sacrifice final model\naccuracy and necessitate additional ML techniques to compensate for this loss,\nlimiting their generality. Some attempts to reduce communication incur high\ncomputation overhead, which makes their performance benefits visible only over\nslow networks.\n  We present 3LC, a lossy compression scheme for state change traffic that\nstrikes balance between multiple goals: traffic reduction, accuracy,\ncomputation overhead, and generality. It combines three new\ntechniques---3-value quantization with sparsity multiplication, quartic\nencoding, and zero-run encoding---to leverage strengths of quantization and\nsparsification techniques and avoid their drawbacks. It achieves a data\ncompression ratio of up to 39--107X, almost the same test accuracy of trained\nmodels, and high compression speed. Distributed ML frameworks can employ 3LC\nwithout modifications to existing ML algorithms. Our experiments show that 3LC\nreduces wall-clock training time of ResNet-110--based image classifiers for\nCIFAR-10 on a 10-GPU cluster by up to 16--23X compared to TensorFlow's baseline\ndesign.\n",
        "computer-vision",
    ],
    [
        "8-Bit Approximations for Parallelism in Deep Learning",
        "  The creation of practical deep learning data-products often requires\nparallelization across processors and computers to make deep learning feasible\non large data sets, but bottlenecks in communication bandwidth make it\ndifficult to attain good speedups through parallelism. Here we develop and test\n8-bit approximation algorithms which make better use of the available bandwidth\nby compressing 32-bit gradients and nonlinear activations to 8-bit\napproximations. We show that these approximations do not decrease predictive\nperformance on MNIST, CIFAR10, and ImageNet for both model and data parallelism\nand provide a data transfer speedup of 2x relative to 32-bit parallelism. We\nbuild a predictive model for speedups based on our experimental data, verify\nits validity on known speedup data, and show that we can obtain a speedup of\n50x and more on a system of 96 GPUs compared to a speedup of 23x for 32-bit. We\ncompare our data types with other methods and show that 8-bit approximations\nachieve state-of-the-art speedups for model parallelism. Thus 8-bit\napproximation is an efficient method to parallelize convolutional networks on\nvery large systems of GPUs.\n",
        "computer-vision",
    ],
    [
