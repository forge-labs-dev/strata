notebook_id = "arxiv-classifier-001"
name = "arXiv Paper Classifier (distributed)"
created_at = 2026-04-10T00:00:00Z
updated_at = 2026-04-10T00:00:00Z

# Two remote workers illustrate "every cell runs on the right machine":
#   - df-cluster: a CPU-heavy DataFusion worker for big-data ops
#   - gpu-fly:    a GPU worker for embeddings and model training
# During local development both point at localhost on different ports;
# in production they point at their respective hosted services.
[[workers]]
name = "df-cluster"
backend = "executor"
runtime_id = "df-cluster"
[workers.config]
url = "http://127.0.0.1:9000/v1/execute"
transport = "http"

[[workers]]
name = "gpu-fly"
backend = "executor"
runtime_id = "gpu-fly"
[workers.config]
url = "https://fangchenli--strata-gpu-worker-gpu-executor.modal.run/v1/execute"
transport = "http"

