name: Integration Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'LICENSE'
      - '.github/workflows/docs.yml'

env:
  CARGO_TERM_COLOR: always
  STRATA_CATALOG_URI: postgresql://strata:strata@localhost:5432/iceberg_catalog

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: strata
          POSTGRES_PASSWORD: strata
          POSTGRES_DB: iceberg_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U strata -d iceberg_catalog"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"

      - name: Install dependencies and build Rust extension
        run: uv sync --all-extras

      - name: Run integration tests
        run: uv run python scripts/integration_test.py --start-server
