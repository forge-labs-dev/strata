services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: strata
      POSTGRES_PASSWORD: strata
      POSTGRES_DB: iceberg_catalog
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strata -d iceberg_catalog"]
      interval: 2s
      timeout: 5s
      retries: 10
