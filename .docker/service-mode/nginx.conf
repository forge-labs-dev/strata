events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream strata_upstream {
        server strata:8765;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://strata_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Strata-Proxy-Token dev-service-token;
            proxy_set_header X-Strata-Principal demo-user;
            proxy_set_header X-Tenant-ID demo-team;
            proxy_set_header X-Strata-Scopes "notebook:read notebook:write notebook:execute";
        }
    }

    server {
        listen 8081;
        server_name _;

        location / {
            proxy_pass http://strata_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-Strata-Proxy-Token dev-service-token;
            proxy_set_header X-Strata-Principal demo-admin;
            proxy_set_header X-Tenant-ID demo-team;
            proxy_set_header X-Strata-Scopes "admin:* notebook:read notebook:write notebook:execute";
        }
    }
}
