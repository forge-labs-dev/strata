# Strata Service Mode Demo Environment
#
# Quick start:
#   docker compose -f docker-compose.service.yml up -d
#
# User notebook UI (normal notebook user):
#   http://localhost:8865
#
# Admin notebook UI / API (worker admin identity):
#   http://localhost:8866
#
# This stack runs:
# - Strata in service mode with trusted-proxy auth enabled
# - a local reference notebook executor
# - an nginx proxy that injects demo user/admin identities

services:
  strata:
    image: strata-service-demo:local
    pull_policy: never
    build: .
    volumes:
      - strata-service-state:/home/strata/.strata
      - strata-service-notebooks:/tmp/strata-notebooks
      - ./.docker/service-mode/pyproject.toml:/home/strata/pyproject.toml:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8765/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      executor:
        condition: service_healthy

  executor:
    image: strata-service-demo:local
    pull_policy: never
    build: .
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "strata.notebook.remote_executor:create_notebook_executor_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8766",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8766/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      strata:
        condition: service_healthy
    ports:
      - "8865:8080"
      - "8866:8081"
    volumes:
      - ./.docker/service-mode/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  strata-service-state:
  strata-service-notebooks:
