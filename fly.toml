# Fly.io deployment configuration for Strata Notebook
#
# Deploy:   fly deploy
# Open:     fly open
# Logs:     fly logs
# Status:   fly status

app = "strata-notebook"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  STRATA_HOST = "0.0.0.0"
  STRATA_PORT = "8765"
  STRATA_DEPLOYMENT_MODE = "personal"
  STRATA_ALLOW_REMOTE_CLIENTS_IN_PERSONAL = "true"
  STRATA_NOTEBOOK_PYTHON_VERSIONS = "3.12,3.13"
  STRATA_CACHE_DIR = "/home/strata/.strata/cache"
  STRATA_METADATA_DB = "/home/strata/.strata/meta.sqlite"
  STRATA_NOTEBOOK_STORAGE_DIR = "/home/strata/.strata/notebooks"
  UV_CACHE_DIR = "/tmp/uv-cache"
  UV_PYTHON_DOWNLOADS = "automatic"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "strata_data"
  destination = "/home/strata/.strata"
  initial_size = "5GB"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "2GB"
  auto_extend_size_limit = "20GB"

[checks]
  [checks.health]
    type = "http"
    port = 8765
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
